<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giochi dell'Oco | Giuseppe Basile</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Orbitron:wght@400..900&family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <a href="index.html">
                    <img src="img/logo-colori.svg" alt="Logo Giochi dell'Oco" id="site-logo">
                </a>
            </div>

            <button class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>

            <ul class="nav-links">
                <li><a href="fanzine.html" class="active">L'Eco dell'Oco</a></li>
                <li><a href="giochi.html">Giochi</a></li>
                <li><a href="progetti.html">Altri Progetti</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero-section">
        <div class="container">
            <h1>Giochi dell'Oco</h1>
            <p class="subtitle">di Giuseppe 'Djuseppe' Basile</p>
        </div>
    </header>

    <main class="main-content container">
        <section class="card">
            <h2>Benvenuti nell'Archivio</h2>
            <p>Qui troverai tutti i numeri della fanzine e i progetti ludici curati da Giuseppe Basile.</p>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container footer-content">
            <div class="footer-left">
                <div class="logo">
                    <img src="img/logo-bn.svg" alt="Logo Giochi dell'Oco" id="mini-logo">
                </div>
                <p class="copyright">&copy; 2026 Giuseppe Basile</p>
            </div>

            <div class="footer-right">
                <a href="mailto:tuaemail@esempio.it">Email</a>
                <a href="https://github.com/djuseppeb" target="_blank">GitHub</a>
                <a href="#">Instagram</a>
            </div>
        </div>
    </footer>

    <script>
        const menu = document.querySelector('#mobile-menu');
        const menuLinks = document.querySelector('.nav-links');
        const body = document.querySelector('body'); // Selezioniamo il body

        menu.addEventListener('click', function () {
            menu.classList.toggle('is-active');
            menuLinks.classList.toggle('active');

            // Se il menu è aperto, blocca lo scroll. Se chiuso, riabilitalo.
            if (menuLinks.classList.contains('active')) {
                body.style.overflow = 'hidden';
            } else {
                body.style.overflow = 'auto';
            }
        });
    </script>

</body>

</html>
